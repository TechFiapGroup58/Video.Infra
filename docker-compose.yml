# Ambiente local completo - todos os servicos MIT/open-source
# Uso: docker compose up --build
# RabbitMQ Management UI: http://localhost:15672  (guest/guest)
# PostgreSQL:             localhost:5432
# MinIO Console:          http://localhost:9001   (minioadmin/minioadmin)

version: "3.9"

services:
  # -------------------------------------------------------
  # Infraestrutura (MIT / licencas permissivas)
  # -------------------------------------------------------

  postgresql:
    image: postgres:16-alpine          # licenca PostgreSQL (semelhante a MIT)
    environment:
      POSTGRES_USER: fiapx
      POSTGRES_PASSWORD: fiapx_dev
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiapx"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine   # licenca Mozilla Public License 2.0 (permissiva)
    environment:
      RABBITMQ_DEFAULT_USER: fiapx
      RABBITMQ_DEFAULT_PASS: fiapx_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO local substitui S3 para desenvolvimento (licenca AGPL - apenas local)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/fiapx-videos --ignore-existing;
        mc anonymous set download local/fiapx-videos;
        echo 'MinIO bucket criado.';
      "

  # -------------------------------------------------------
  # Aplicacoes
  # -------------------------------------------------------

  auth-service:
    build:
      context: ../Video.AuthService
      dockerfile: ../Video.InfraService/docker/auth-service/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgresql;Port=5432;Database=fiapx_auth;Username=fiapx;Password=fiapx_dev"
      JWT__Secret: "dev-secret-key-min-32-chars-xxxxxxxx"
    depends_on:
      postgresql:
        condition: service_healthy

  upload-service:
    build:
      context: ../Video.UploadService
      dockerfile: ../Video.InfraService/docker/upload-service/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgresql;Port=5432;Database=fiapx_upload;Username=fiapx;Password=fiapx_dev"
      JWT__Secret: "dev-secret-key-min-32-chars-xxxxxxxx"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: fiapx
      RabbitMQ__Password: fiapx_dev
      AWS__ServiceURL: "http://minio:9000"
      AWS__S3BucketName: fiapx-videos
      AWS__Region: us-east-1
      AWS__ForcePathStyle: "true"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  processor-service:
    build:
      context: ../Video.ProcessorService
      dockerfile: ../Video.InfraService/docker/processor-service/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgresql;Port=5432;Database=fiapx_processor;Username=fiapx;Password=fiapx_dev"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: fiapx
      RabbitMQ__Password: fiapx_dev
      AWS__ServiceURL: "http://minio:9000"
      AWS__S3BucketName: fiapx-videos
      AWS__Region: us-east-1
      AWS__ForcePathStyle: "true"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ../Video.Frontend
      dockerfile: ../Video.InfraService/docker/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - upload-service

volumes:
  pg_data:
  rabbitmq_data:
  minio_data:
