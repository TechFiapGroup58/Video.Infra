server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - todas as rotas servem index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check para readiness/liveness probe
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Cache agressivo para assets estaticos (hash no nome do arquivo)
    location ~* \.(js|css|wasm|dat|blat)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para index.html e appsettings
    location ~* (index\.html|appsettings.*\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    gzip on;
    gzip_types text/plain application/javascript application/wasm application/octet-stream;
    gzip_min_length 1024;
}
