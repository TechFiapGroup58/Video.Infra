apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: fiapx
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: REPLACE_AWS_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/fiapx/auth-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: AUTH_ASPNETCORE_URLS
            - name: ConnectionStrings__DefaultConnection
              value: "Host=$(POSTGRES_HOST);Port=$(POSTGRES_PORT);Database=$(AUTH_DB_NAME);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: POSTGRES_PORT
            - name: AUTH_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: AUTH_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT__Secret
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: fiapx
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  namespace: fiapx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
