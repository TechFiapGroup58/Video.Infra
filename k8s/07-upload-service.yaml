apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: fiapx
  labels:
    app: upload-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upload-service
  template:
    metadata:
      labels:
        app: upload-service
      annotations:
        iam.amazonaws.com/role: REPLACE_POD_S3_ROLE_ARN
    spec:
      serviceAccountName: fiapx-upload
      containers:
        - name: upload-service
          image: REPLACE_AWS_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/fiapx/upload-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: UPLOAD_ASPNETCORE_URLS
            - name: ConnectionStrings__DefaultConnection
              value: "Host=$(POSTGRES_HOST);Port=$(POSTGRES_PORT);Database=$(UPLOAD_DB_NAME);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: POSTGRES_PORT
            - name: UPLOAD_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: UPLOAD_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT__Secret
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: JWT_SECRET
            - name: RabbitMQ__Host
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: RABBITMQ_HOST
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: RABBITMQ_USER
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: RABBITMQ_PASSWORD
            - name: AWS__S3BucketName
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: S3_BUCKET_NAME
            - name: AWS__Region
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: AWS_REGION
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fiapx-upload
  namespace: fiapx
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_POD_S3_ROLE_ARN
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: fiapx
spec:
  selector:
    app: upload-service
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-service
  namespace: fiapx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
